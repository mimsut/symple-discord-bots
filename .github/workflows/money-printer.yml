name: Money Printer Morning Brief (08:00 KST)
on:
  schedule:
    - cron: '0 23 * * *'  # 23:00 UTC = 08:00 KST 다음날
  workflow_dispatch:
jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install -r requirements.txt -q
      - run: python scripts/money_printer.py
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          DISCORD_MONEY_PRINTER: ${{ secrets.DISCORD_MONEY_PRINTER }}
