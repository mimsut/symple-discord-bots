name: SYMPLE Founder Feedback (22:00 KST)
on:
  schedule:
    - cron: '0 13 * * *'
  workflow_dispatch:
jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install -r requirements.txt -q
      - run: python scripts/founder_feedback.py
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          DISCORD_YC_FEEDBACK: ${{ secrets.DISCORD_YC_FEEDBACK }}
